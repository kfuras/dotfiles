# ~/.config/starship.toml

# Inserts a blank line between shell prompts
add_newline = true

# Change the default prompt format
#format = """\
#[в•ӯв•ҙ](bold green)$env_var\
#$all[в•°в”Җ](bold green)$character\
#"""
format = """\
[в•ӯв•ҙ](bold green)$os$username$hostname$directory$git_branch$git_status
$battery
[в•°в”Җ](bold green)$character\
"""

[os]
format = '[$symbol](bold white) '   
disabled = false

[os.symbols]
Windows = 'оҳӘ '
Arch = 'у°ЈҮ'
Ubuntu = 'пҢӣ'
Macos = 'у°Җө'

# Shows the username
[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style) '
disabled = false
show_always = true

# Shows the hostname
[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow) '
disabled = false

# Change the default prompt characters
[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold green)"

# Shows an icon that should be included by zshrc script based on the distribution or os
[env_var.STARSHIP_DISTRO]
format = '[$env_value](bold white)'  # removed space between distro and rest for pwsh
variable = "STARSHIP_DISTRO"
disabled = false

[battery]
full_symbol = 'у°Ғ№ '
charging_symbol = 'у°Ӯ„ '
discharging_symbol = 'у°Ӯғ '

[[battery.display]] # 'bold yellow' style and discharging_symbol symbol when capacity is between 50% and 100%
threshold = 100
style = 'bold green'

[[battery.display]] # 'bold yellow' style and discharging_symbol when capacity is between 15% and 50%
threshold = 50
style = 'bold yellow'

[[battery.display]] # 'bold red' style and discharging_symbol when capacity is between 0% and 15%
threshold = 15
style = 'bold red'

[directory]
truncation_length = 128
truncation_symbol = "вҖҰ/"
home_symbol = "у°Ӣң"
use_os_path_sep = true
use_logical_path = true
read_only_style = "197"
read_only = " пҖЈ "
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "пһЎ "
format = "on [$symbol$branch]($style) "
truncation_length = 128
truncation_symbol = "вҖҰ/"
style = "bold green"

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "рҹҸі"
up_to_date = "пҒҶ "
untracked = "п”© "
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
stashed = "пЈ– "
modified = "пҒ„ "
staged = '[++\($count\)](green)'
renamed = "пӘ¶ "
deleted = "пҖ” "

[terraform]
format = "via [п„ө terraform $version]($style) пҘӮ [$workspace]($style) "

[vagrant]
format = "via [п„ө vagrant $version]($style) "

[docker_context]
format = "via [пҢҲ $context](bold blue) "

[helm]
format = "via [пҲҡ $version](bold purple) "

[python]
symbol = "п ҹ "
python_binary = "python3"

[nodejs]
format = "via [пўҳ $version](bold green) "
disabled = true

[ruby]
format = "via [оҲҫ $version]($style) "

[kubernetes]
format = 'on [пҲҡ $context\($namespace\)](bold purple) '
disabled = false
[kubernetes.context_aliases]
"clcreative-k8s-staging" = "cl-k8s-staging"
"clcreative-k8s-production" = "cl-k8s-prod"
